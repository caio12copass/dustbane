<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Allergy Knight: Mega Edition - Sistema de Kills para Upgrades</title>
    <style>
        body { margin: 0; background: #0a0a0a; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: 'Courier New', Courier, monospace; cursor: crosshair; }
        canvas { border: 5px solid #444; background: #1a1a1a; display: block; box-shadow: 0 0 30px rgba(0,255,255,0.2); }
        
        .ui { 
            position: absolute; top: 15px; left: 15px; color: white; pointer-events: none; z-index: 10; 
            text-shadow: 2px 2px 4px #000; background: rgba(0,0,0,0.6); padding: 15px; border-radius: 8px; border: 1px solid #333;
        }

        .special-bar-container { width: 180px; height: 14px; background: #111; border: 2px solid #444; margin-top: 8px; border-radius: 10px; overflow: hidden; }
        #special-fill { width: 0%; height: 100%; background: #00FFFF; transition: width 0.2s; }

        .menu-overlay {
            position: absolute; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.85);
            display: none; flex-direction: column; justify-content: center; align-items: center; 
            color: white; z-index: 100; text-align: center;
        }

        #upgrade-menu { background: rgba(0, 0, 0, 0.95); }
        
        .btn-ui {
            background: #222; border: 2px solid #00FFFF; color: white; padding: 15px 30px; 
            cursor: pointer; font-family: 'Courier New'; font-size: 18px; transition: 0.2s; margin-top: 20px;
        }
        .btn-ui:hover { background: #00FFFF; color: black; box-shadow: 0 0 15px #00FFFF; }

        .upgrade-btn {
            background: #111; border: 1px solid #00FFFF; color: white; padding: 10px; cursor: pointer;
            font-family: 'Courier New'; transition: 0.2s; width: 300px; margin-bottom: 10px;
        }
        .upgrade-btn:hover { background: #00FFFF; color: black; }

        #minimap-container { 
            position: absolute; top: 15px; right: 15px; 
            background: rgba(0,0,0,0.8); padding: 8px; 
            border: 2px solid #00FFFF; border-radius: 4px;
            z-index: 10;
        }
        
        .boss-warning {
            position: absolute;
            top: 80px;
            right: 15px;
            background: rgba(255,0,0,0.8);
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
            font-weight: bold;
            font-size: 12px;
            animation: pulse 1s infinite;
            pointer-events: none;
            z-index: 10;
        }
        
        @keyframes pulse {
            0% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.1); }
            100% { opacity: 0.5; transform: scale(1); }
        }
        
        .kill-counter {
            position: absolute;
            bottom: 15px;
            left: 15px;
            background: rgba(0,0,0,0.7);
            color: #ffaa00;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 12px;
            font-weight: bold;
            font-family: 'Courier New', monospace;
            pointer-events: none;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div id="pause-menu" class="menu-overlay">
        <h1 style="color: #00FFFF; letter-spacing: 10px; margin-bottom: 0;">PAUSADO</h1>
        <p style="color: #888;">O pó não vai se limpar sozinho...</p>
        <button class="btn-ui" onclick="togglePause()">CONTINUAR (ESC)</button>
    </div>

    <div id="upgrade-menu" class="menu-overlay">
        <h2 style="color:#00FFFF; margin:0; font-size: 40px;">UPGRADE!</h2>
        <p>Escolha uma melhoria para seu aspirador:</p>
        <div id="upgrade-options" style="display:flex; flex-direction:column; align-items:center;"></div>
    </div>

    <div class="ui">
        <div id="hearts" style="font-size: 30px; color: #ff4444; margin-bottom: 5px;">❤️❤️❤️</div>
        <div id="room-info" style="font-size: 16px; color: #00FFFF; font-weight: bold;">SALA: 1</div>
        <div style="font-size: 11px; color: #aaa; margin-top: 8px;">CARGA DO ASPIRADOR:</div>
        <div class="special-bar-container"><div id="special-fill"></div></div>
        <div id="upgrades-active" style="font-size: 10px; color: #00FF00; margin-top: 5px;"></div>
    </div>

    <div id="minimap-container"><canvas id="miniMap" width="140" height="140"></canvas></div>
    <div id="boss-warning" class="boss-warning" style="display: none;">⚠️ LORDE ÁCARO APROXIMA! ⚠️</div>
    <div class="kill-counter" id="kill-counter">💀 INIMIGOS: 0 | PRÓXIMO UPGRADE: 10</div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const mCanvas = document.getElementById('miniMap');
        const mCtx = mCanvas.getContext('2d');
        canvas.width = 800; canvas.height = 600;
        mCanvas.width = 140; mCanvas.height = 140;
        
        let isGameOver = false;
        let isPaused = false;
        let isUpgrading = false;
        let roomCount = 1; 
        let specialUsageCount = 0; 
        
        // NOVO: Sistema de kills para upgrades
        let totalKills = 0;
        let killsNeededForNextUpgrade = 10;
        let upgradeKillsBase = 10;
        
        let currentPos = { x: 0, y: 0 };
        let visitedRooms = new Set(["0,0"]);
        let clearedRooms = new Set(["0,0"]);
        
        let gameTime = 0;
        let shakeTime = 0;
        const globalRoomData = {};
        const WORLD_LIMIT = 8;
        
        let bossRoomPosition = null;
        let bossDefeated = false;
        let bossWarningGiven = false;
        
        let particles = [];
        let ambientDust = [];
        let items = [];
        let dustPoints = 0;
        const MAX_DUST = 10;
        let isSuperVacuumActive = false;
        let superVacuumTimer = 0;

        const playerUpgrades = { filter: 200, battery: 180, water: false, mask: 3 };
        
        // NERF: Velocidade reduzida de 3.8 para 3.0
        const player = { 
            x: 400, y: 300, size: 28, speed: 3.0, hp: 6, maxHp: 6, 
            vx: 0, vy: 0, invincible: false, lastShot: 0, 
            shotDelay: 250, // NERF: Aumentado de 150 para 250 (tiros mais lentos)
            isVacuuming: false, isMoving: false, walkCycle: 0,
            vacuumCharge: 0,
            maxVacuumCharge: 100
        };

        let enemies = [];
        let bullets = [];
        let enemyBullets = [];
        const keys = {};
        const mouse = { x: 0, y: 0 };
        let doors = [];
        
        let ambientObjects = [];
        let lightPoints = [];

        for(let i=0; i<40; i++) ambientDust.push({x: Math.random()*800, y: Math.random()*600, s: Math.random()*2+1, o: Math.random()});

        // NOVO: Função para verificar e abrir menu de upgrade baseado em kills
        function checkUpgradeByKills() {
            if(totalKills >= killsNeededForNextUpgrade && !isUpgrading && !bossDefeated && !isGameOver) {
                killsNeededForNextUpgrade += upgradeKillsBase + Math.floor(totalKills / 20);
                openUpgradeMenu();
                updateKillCounter();
            }
        }
        
        function updateKillCounter() {
            const remaining = Math.max(0, killsNeededForNextUpgrade - totalKills);
            document.getElementById('kill-counter').innerHTML = `💀 INIMIGOS: ${totalKills} | PRÓXIMO UPGRADE: ${remaining}`;
        }

        function chooseRandomBossRoom() {
            const x = Math.floor(Math.random() * (WORLD_LIMIT * 2 + 1)) - WORLD_LIMIT;
            const y = Math.floor(Math.random() * (WORLD_LIMIT * 2 + 1)) - WORLD_LIMIT;
            if(x === 0 && y === 0) return chooseRandomBossRoom();
            return { x, y };
        }

        function checkBossProximity() {
            if(bossDefeated || !bossRoomPosition) return false;
            
            if(currentPos.x === bossRoomPosition.x && currentPos.y === bossRoomPosition.y) {
                document.getElementById('boss-warning').style.display = 'none';
                return true;
            }
            
            const adjacent = [
                {x: currentPos.x + 1, y: currentPos.y},
                {x: currentPos.x - 1, y: currentPos.y},
                {x: currentPos.x, y: currentPos.y + 1},
                {x: currentPos.x, y: currentPos.y - 1}
            ];
            
            const isNear = adjacent.some(pos => pos.x === bossRoomPosition.x && pos.y === bossRoomPosition.y);
            
            if(isNear && !bossWarningGiven) {
                document.getElementById('boss-warning').style.display = 'block';
                bossWarningGiven = true;
                setTimeout(() => {
                    if(!bossDefeated) document.getElementById('boss-warning').style.display = 'none';
                }, 3000);
            } else if(!isNear) {
                document.getElementById('boss-warning').style.display = 'none';
                bossWarningGiven = false;
            }
            
            return false;
        }

        function togglePause() {
            if (isGameOver || isUpgrading) return;
            isPaused = !isPaused;
            document.getElementById('pause-menu').style.display = isPaused ? 'flex' : 'none';
        }

        function openUpgradeMenu() {
            isUpgrading = true;
            const menu = document.getElementById('upgrade-menu');
            const container = document.getElementById('upgrade-options');
            container.innerHTML = '';
            menu.style.display = 'flex';
            
            const pool = [
                { id: 'filter', name: 'Filtro HEPA', desc: 'Cone de vácuo maior +50' },
                { id: 'battery', name: 'Bateria Lítio', desc: 'Especial dura +1.5s' },
                { id: 'water', name: 'Spray Água', desc: 'Tiros causam lentidão' },
                { id: 'mask', name: 'Máscara Cirúrgica', desc: '+1 Coração Máximo' }
            ];
            
            pool.sort(() => Math.random() - 0.5).slice(0, 3).forEach(up => {
                const btn = document.createElement('button');
                btn.className = 'upgrade-btn';
                btn.innerHTML = `<b>${up.name}</b><br><small>${up.desc}</small>`;
                btn.onclick = () => {
                    if(up.id === 'filter') playerUpgrades.filter += 50;
                    if(up.id === 'battery') playerUpgrades.battery += 90;
                    if(up.id === 'water') playerUpgrades.water = true;
                    if(up.id === 'mask') { player.maxHp += 2; player.hp += 2; playerUpgrades.mask++; }
                    menu.style.display = 'none'; isUpgrading = false; updateUI();
                };
                container.appendChild(btn);
            });
        }

        function createParticles(x, y, color, count = 8, speed = 4) {
            for(let i=0; i<count; i++) particles.push({ x, y, vx: (Math.random()-0.5)*speed, vy: (Math.random()-0.5)*speed, life: 1.0, color, size: Math.random()*4+2 });
        }

        function spawnItem(x, y, isMimic = false) { 
            if(Math.random() < 0.25 && !isMimic) items.push({ x, y, type: 'heal', size: 15 }); 
        }

        function getRoomData(posKey) {
            if (globalRoomData[posKey]) return globalRoomData[posKey];
            
            let obs = [];
            let isCarpet = false;
            let ambientObj = [];
            let lights = [];
            
            const isBossRoom = bossRoomPosition && 
                parseInt(posKey.split(',')[0]) === bossRoomPosition.x && 
                parseInt(posKey.split(',')[1]) === bossRoomPosition.y;
            
            if (posKey !== "0,0") {
                isCarpet = Math.random() < 0.3;
                let numObstacles = isBossRoom ? 3 : (6 + Math.floor(Math.random() * 3));
                for(let i=0; i<numObstacles; i++) {
                    let ox = Math.floor(2 + Math.random() * 16) * 40;
                    let oy = Math.floor(2 + Math.random() * 10) * 40;
                    if (!((ox > 300 && ox < 500) || (oy > 200 && oy < 400))) obs.push({ x: ox, y: oy, w: 40, h: 40 });
                }
                
                if(Math.random() < 0.2 && !isBossRoom) {
                    let fanX = 100 + Math.random() * 600;
                    let fanY = 100 + Math.random() * 400;
                    let fanDir = ['up', 'down', 'left', 'right'][Math.floor(Math.random() * 4)];
                    ambientObj.push({ x: fanX, y: fanY, type: 'fan', direction: fanDir, active: false, cooldown: 0, radius: 120 });
                }
                
                let numLights = isBossRoom ? 5 : (2 + Math.floor(Math.random() * 3));
                for(let i = 0; i < numLights; i++) {
                    lights.push({
                        x: 50 + Math.random() * 700,
                        y: 50 + Math.random() * 500,
                        radius: isBossRoom ? 100 : (60 + Math.random() * 40),
                        intensity: isBossRoom ? 0.3 : (0.15 + Math.random() * 0.15),
                        color: isBossRoom ? "rgba(255, 50, 50, 0.35)" : `rgba(255, 200, 100, ${0.15 + Math.random() * 0.15})`
                    });
                }
            } else {
                lights.push({ x: 400, y: 300, radius: 120, intensity: 0.3, color: "rgba(255, 215, 0, 0.3)" });
                lights.push({ x: 200, y: 200, radius: 80, intensity: 0.25, color: "rgba(255, 165, 0, 0.25)" });
                lights.push({ x: 600, y: 400, radius: 80, intensity: 0.25, color: "rgba(255, 165, 0, 0.25)" });
            }
            
            globalRoomData[posKey] = { obstacles: obs, isCarpet: isCarpet, ambientObjects: ambientObj, lightPoints: lights, isBossRoom: isBossRoom };
            return globalRoomData[posKey];
        }

        function checkCollision(x, y, size, obsList) {
            for (let o of obsList) if (x < o.x + o.w && x + size > o.x && y < o.y + o.h && y + size > o.y) return true;
            return false;
        }

        function spawnEnemy(x, y, type) {
            const types = {
                'acaro': { color: "#5d4037", size: 30, speed: 2.2, hp: 40, flyer: false, spawner: false, mimic: false },
                'tufo': { color: "#9e9e9e", size: 45, speed: 1.0, hp: 80, flyer: false, spawner: false, mimic: false },
                'esporo': { color: "#81c784", size: 25, speed: 2.8, hp: 30, explode: true, flyer: false, spawner: false, mimic: false },
                'polen': { color: "#FFD700", size: 22, speed: 3.5, hp: 35, flyer: true, flyHeight: 0, flySpeed: 0.05, flyerOffset: 0 },
                'mofo': { color: "#8B4513", size: 40, speed: 0, hp: 60, spawner: true, spawnTimer: 0, spawnDelay: 300 },
                'mimic': { color: "#ff4444", size: 28, speed: 4, hp: 50, mimic: true, revealed: false }
            };
            const t = types[type];
            let extraProps = {};
            if(type === 'polen') extraProps = { flyHeight: 0, flyerOffset: Math.random() * Math.PI * 2 };
            if(type === 'mofo') extraProps = { spawnTimer: 0, spawnDelay: 300 };
            if(type === 'mimic') extraProps = { revealed: false };
            
            enemies.push({ ...t, ...extraProps, type, x, y, vx: 0, vy: 0, state: 'idle', stateTimer: 0, flash: 0, slow: 0 });
        }

        function generateRoom(direction) {
            const posKey = `${currentPos.x},${currentPos.y}`;
            
            enemies = [];
            bullets = [];
            enemyBullets = [];
            items = [];
            particles = [];
            
            const roomData = getRoomData(posKey);
            
            ambientObjects = roomData.ambientObjects ? [...roomData.ambientObjects] : [];
            lightPoints = roomData.lightPoints ? [...roomData.lightPoints] : [];
            
            if(direction === 'top') player.y = 520;
            if(direction === 'bottom') player.y = 60;
            if(direction === 'left') player.x = 720;
            if(direction === 'right') player.x = 60;
            
            const isBossRoom = roomData.isBossRoom;
            
            if (isBossRoom && !clearedRooms.has(posKey) && !bossDefeated) {
                spawnEnemy(canvas.width/2 - 65, canvas.height/2 - 65, 'boss');
                document.getElementById('room-info').style.color = "#ff4444";
                document.getElementById('room-info').style.textShadow = "0 0 10px red";
                createParticles(canvas.width/2, canvas.height/2, "#ff0000", 50, 10);
            } 
            else if (posKey !== "0,0" && !clearedRooms.has(posKey) && !isBossRoom) {
                // Dificuldade aumenta GRADUALMENTE a cada sala
                let numInimigos = 3 + Math.floor(roomCount / 4) + Math.floor(specialUsageCount * 1);
                numInimigos = Math.min(numInimigos, 8);
                
                for(let i=0; i<numInimigos; i++) {
                    let ex, ey;
                    let availableTypes = ['acaro', 'tufo', 'esporo', 'polen', 'mofo'];
                    
                    let isMimicSpawn = Math.random() < 0.1 && items.length < 3;
                    let eType = isMimicSpawn ? 'mimic' : availableTypes[Math.floor(Math.random() * availableTypes.length)];
                    
                    let tentativas = 0;
                    do { 
                        ex = 100 + Math.random()*600; 
                        ey = 100 + Math.random()*400;
                        tentativas++;
                        if(tentativas > 50) break;
                    } while (Math.hypot(ex-player.x, ey-player.y) < 150 || checkCollision(ex, ey, 30, roomData.obstacles));
                    
                    if(eType === 'mimic') {
                        items.push({ x: ex, y: ey, type: 'heal', size: 15, isMimic: true });
                    } else {
                        spawnEnemy(ex, ey, eType);
                    }
                }
            }
            
            updateUI();
            updateDoors();
        }

        function updateDoors() {
            doors = [];
            if (currentPos.y > -WORLD_LIMIT) doors.push({ dir: 'top', x: 350, y: 0, w: 100, h: 20 });
            if (currentPos.y < WORLD_LIMIT) doors.push({ dir: 'bottom', x: 350, y: 580, w: 100, h: 20 });
            if (currentPos.x > -WORLD_LIMIT) doors.push({ dir: 'left', x: 0, y: 250, w: 20, h: 100 });
            if (currentPos.x < WORLD_LIMIT) doors.push({ dir: 'right', x: 780, y: 250, w: 20, h: 100 });
        }

        function updateUI() {
            let h = ""; let temp = player.hp;
            for (let i=0; i<playerUpgrades.mask; i++) {
                if (temp >= 2) h += "❤️"; 
                else if (temp === 1) h += "💔"; 
                else h += "🖤";
                temp -= 2;
            }
            document.getElementById('hearts').innerHTML = h || "💀";
            
            if(bossRoomPosition && currentPos.x === bossRoomPosition.x && currentPos.y === bossRoomPosition.y && !bossDefeated) {
                document.getElementById('room-info').innerHTML = "⚠️ SALA DO LORDE ÁCARO ⚠️";
                document.getElementById('room-info').style.color = "#ff4444";
            } else {
                document.getElementById('room-info').innerHTML = `SALA: ${roomCount}`;
                document.getElementById('room-info').style.color = "#00FFFF";
                document.getElementById('room-info').style.textShadow = "none";
            }
            
            document.getElementById('upgrades-active').innerHTML = playerUpgrades.water ? "💦 SPRAY DE ÁGUA ATIVO" : "";
            
            const fill = document.getElementById('special-fill');
            const chargePercent = (player.vacuumCharge / player.maxVacuumCharge) * 100;
            fill.style.width = chargePercent + "%";
            fill.style.background = player.vacuumCharge >= player.maxVacuumCharge ? "#FF00FF" : "#00FFFF";

            // MINIMAPA
            mCtx.clearRect(0,0,140,140);
            mCtx.fillStyle = "#0a0a0a";
            mCtx.fillRect(0,0,140,140);
            
            const mapSize = WORLD_LIMIT * 2 + 1;
            const cellSize = 140 / mapSize;
            
            mCtx.strokeStyle = "rgba(0, 255, 255, 0.3)";
            mCtx.strokeRect(0, 0, 140, 140);
            
            visitedRooms.forEach(pos => {
                const [px, py] = pos.split(',').map(Number);
                const canvasX = (px + WORLD_LIMIT) * cellSize;
                const canvasY = (py + WORLD_LIMIT) * cellSize;
                
                if(bossRoomPosition && px === bossRoomPosition.x && py === bossRoomPosition.y && !bossDefeated) {
                    mCtx.fillStyle = "#FF0000";
                    mCtx.fillRect(canvasX + 1, canvasY + 1, cellSize - 2, cellSize - 2);
                    if(Math.floor(gameTime * 5) % 2 === 0) {
                        mCtx.fillStyle = "#FF4444";
                        mCtx.fillRect(canvasX, canvasY, cellSize, cellSize);
                    }
                } 
                else if(px === currentPos.x && py === currentPos.y) {
                    mCtx.fillStyle = "#00FFFF";
                    mCtx.fillRect(canvasX + 1, canvasY + 1, cellSize - 2, cellSize - 2);
                } 
                else {
                    mCtx.fillStyle = "#444";
                    mCtx.fillRect(canvasX + 1, canvasY + 1, cellSize - 2, cellSize - 2);
                }
            });
            
            mCtx.beginPath();
            mCtx.strokeStyle = "rgba(100,100,100,0.3)";
            mCtx.lineWidth = 0.5;
            for(let i = 0; i <= mapSize; i++) {
                mCtx.moveTo(i * cellSize, 0);
                mCtx.lineTo(i * cellSize, 140);
                mCtx.moveTo(0, i * cellSize);
                mCtx.lineTo(140, i * cellSize);
                mCtx.stroke();
            }
        }

        window.onkeydown = (e) => {
            keys[e.code] = true;
            if (e.code === 'Escape') togglePause();
            if (e.code === 'Space' && player.vacuumCharge >= player.maxVacuumCharge && !isSuperVacuumActive && !isGameOver && !isPaused && !isUpgrading) {
                e.preventDefault();
                isSuperVacuumActive = true;
                player.vacuumCharge = 0;
                specialUsageCount++;
                superVacuumTimer = playerUpgrades.battery;
                shakeTime = 20;
                updateUI();
                createParticles(player.x+14, player.y+14, "#FF00FF", 30, 8);
            }
        };
        window.onkeyup = (e) => keys[e.code] = false;
        window.onmousemove = (e) => { const r = canvas.getBoundingClientRect(); mouse.x = e.clientX - r.left; mouse.y = e.clientY - r.top; };
        window.onmousedown = (e) => { if (isGameOver) location.reload(); if (e.button === 0) keys['MouseDown'] = true; };
        window.onmouseup = (e) => keys['MouseDown'] = false;

        function update() {
            if (isGameOver || isPaused || isUpgrading) return;
            gameTime += 0.05; 
            if (shakeTime > 0) shakeTime--;

            player.isMoving = keys['KeyW'] || keys['KeyS'] || keys['KeyA'] || keys['KeyD'];
            if (player.isMoving) { player.walkCycle += 0.25; } else { player.walkCycle *= 0.8; }

            ambientDust.forEach(d => {
                d.y += 0.2; 
                d.x += Math.sin(gameTime + d.y*0.01) * 0.2;
                if(d.y > 600) d.y = -10;
            });

            if (superVacuumTimer > 0) {
                superVacuumTimer--;
                player.isVacuuming = true;
                if (superVacuumTimer === 0) {
                    isSuperVacuumActive = false;
                    player.isVacuuming = false;
                }
            } else { 
                player.isVacuuming = false; 
            }

            const roomData = getRoomData(`${currentPos.x},${currentPos.y}`);
            
            let moveX = 0; let moveY = 0;
            if (keys['KeyW']) moveY -= player.speed; 
            if (keys['KeyS']) moveY += player.speed;
            if (keys['KeyA']) moveX -= player.speed; 
            if (keys['KeyD']) moveX += player.speed;

            player.vx *= 0.85; 
            player.vy *= 0.85; 
            let finalX = player.x + moveX + player.vx;
            let finalY = player.y + moveY + player.vy;

            if (!checkCollision(player.x, finalY, player.size, roomData.obstacles)) 
                player.y = Math.max(0, Math.min(600-player.size, finalY));
            if (!checkCollision(finalX, player.y, player.size, roomData.obstacles)) 
                player.x = Math.max(0, Math.min(800-player.size, finalX));

            items = items.filter(it => {
                if (Math.hypot(player.x+14 - it.x, player.y+14 - it.y) < 30) {
                    if(it.isMimic && !it.revealed) {
                        createParticles(it.x, it.y, "#ff0000", 20, 5);
                        spawnEnemy(it.x, it.y, 'mimic');
                        return false;
                    } else if(!it.isMimic) {
                        player.hp = Math.min(player.maxHp, player.hp + 2); 
                        updateUI();
                        createParticles(it.x, it.y, "#ff4444", 10);
                        return false;
                    }
                }
                return true;
            });

            particles.forEach(p => { p.x += p.vx; p.y += p.vy; p.life -= 0.02; });
            particles = particles.filter(p => p.life > 0);

            ambientObjects.forEach(obj => {
                if(obj.type === 'fan') {
                    if(obj.cooldown > 0) obj.cooldown--;
                    if(obj.active && obj.cooldown > 0) {
                        let dx = 0, dy = 0;
                        const force = 8;
                        switch(obj.direction) {
                            case 'up': dy = -force; break;
                            case 'down': dy = force; break;
                            case 'left': dx = -force; break;
                            case 'right': dx = force; break;
                        }
                        if(Math.hypot(player.x+14 - obj.x, player.y+14 - obj.y) < obj.radius) {
                            player.vx += dx * 0.5;
                            player.vy += dy * 0.5;
                        }
                        enemies.forEach(en => {
                            if(Math.hypot(en.x+en.size/2 - obj.x, en.y+en.size/2 - obj.y) < obj.radius) {
                                en.vx += dx;
                                en.vy += dy;
                            }
                        });
                    }
                }
            });

            enemies.forEach(en => {
                const enCX = en.x + en.size/2;
                const enCY = en.y + en.size/2;
                const dist = Math.hypot((player.x+14) - enCX, (player.y+14) - enCY);
                
                if(en.flash > 0) en.flash--;
                if(en.slow > 0) en.slow--;
                let eSpeed = en.slow > 0 ? en.speed * 0.3 : en.speed;
                
                if(en.flyer) {
                    en.flyHeight += en.flySpeed;
                    if (!en.isBoss) {
                        const a = Math.atan2((player.y+14)-enCY, (player.x+14)-enCX);
                        en.x += Math.cos(a)*eSpeed;
                        en.y += Math.sin(a)*eSpeed;
                    }
                }
                else if(en.spawner) {
                    en.spawnTimer++;
                    if(en.spawnTimer >= en.spawnDelay) {
                        en.spawnTimer = 0;
                        for(let i=0; i<3; i++) {
                            let angle = (Math.PI * 2 / 3) * i;
                            let spawnX = en.x + en.size/2 + Math.cos(angle) * 40;
                            let spawnY = en.y + en.size/2 + Math.sin(angle) * 40;
                            enemies.push({
                                type: 'esporo_mini', color: "#a5d6a7", size: 18, speed: 3.2, hp: 15, explode: true,
                                x: spawnX - 9, y: spawnY - 9, vx: 0, vy: 0, flash: 0, slow: 0
                            });
                        }
                        createParticles(en.x+en.size/2, en.y+en.size/2, "#8B4513", 15);
                    }
                }
                else if(en.mimic && !en.revealed) {
                    en.revealed = true;
                }
                else if (!en.isBoss && !en.flyer && !en.spawner) {
                    const a = Math.atan2((player.y+14)-enCY, (player.x+14)-enCX);
                    if (!checkCollision(en.x+Math.cos(a)*eSpeed, en.y, en.size, roomData.obstacles)) 
                        en.x += Math.cos(a)*eSpeed;
                    if (!checkCollision(en.x, en.y+Math.sin(a)*eSpeed, en.size, roomData.obstacles)) 
                        en.y += Math.sin(a)*eSpeed;
                }
                
                if(en.isBoss) {
                    en.stateTimer--; 
                    if (en.stateTimer <= 0) { 
                        en.state = Math.random() < 0.6 ? 'dash' : 'spiral';
                        en.stateTimer = en.state === 'dash' ? 40 : 100;
                    }
                    
                    if (en.state === 'dash') { 
                        const a = Math.atan2((player.y+14)-enCY, (player.x+14)-enCX); 
                        let bnx = en.x + Math.cos(a)*6.5; 
                        let bny = en.y + Math.sin(a)*6.5;
                        if(bnx > 50 && bnx < 750) en.x = bnx; 
                        if(bny > 50 && bny < 550) en.y = bny;
                    } 
                    else if (en.state === 'spiral' && en.stateTimer % 4 === 0) {
                        const numTiros = 4;
                        for(let i=0; i<numTiros; i++) { 
                            const a = gameTime * 3 + (i * (Math.PI*2/numTiros));
                            enemyBullets.push({x: enCX, y: enCY, vx: Math.cos(a)*6, vy: Math.sin(a)*6}); 
                        }
                    }
                }
                
                en.x += en.vx; 
                en.y += en.vy; 
                en.vx *= 0.9; 
                en.vy *= 0.9;
                
                if (player.isVacuuming && dist < playerUpgrades.filter) {
                    const a = Math.atan2(enCY - (player.y+14), enCX - (player.x+14));
                    if(isSuperVacuumActive) { 
                        en.vx -= Math.cos(a) * 12;
                        en.vy -= Math.sin(a) * 12;
                        if (dist < 50 + en.size/2) en.hp = 0;
                    } else {
                        en.vx -= Math.cos(a) * 3;
                        en.vy -= Math.sin(a) * 3;
                    }
                }
                
                if (dist < en.size/2 + 12 && !player.invincible) {
                    player.hp -= en.isBoss ? 2 : 1;
                    updateUI(); 
                    player.invincible = true; 
                    shakeTime = 20;
                    const knockAngle = Math.atan2((player.y+14) - enCY, (player.x+14) - enCX);
                    player.vx = Math.cos(knockAngle) * 25; 
                    player.vy = Math.sin(knockAngle) * 25;
                    if (player.hp <= 0) isGameOver = true; 
                    setTimeout(() => player.invincible = false, 800);
                }
            });

            // NERF: Tiros mais lentos (shotDelay já aumentado para 250)
            if (keys['MouseDown'] && Date.now() - player.lastShot > player.shotDelay) {
                const a = Math.atan2(mouse.y - (player.y+14), mouse.x - (player.x+14));
                bullets.push({ x: player.x+14, y: player.y+14, vx: Math.cos(a)*12, vy: Math.sin(a)*12, hitEnemy: false });
                player.lastShot = Date.now();
            }

            bullets = bullets.filter(b => {
                b.x += b.vx; 
                b.y += b.vy;
                let hit = checkCollision(b.x, b.y, 4, roomData.obstacles);
                
                ambientObjects.forEach(obj => {
                    if(obj.type === 'fan' && obj.cooldown === 0 && Math.hypot(b.x - obj.x, b.y - obj.y) < 15) {
                        obj.active = true;
                        obj.cooldown = 180;
                        createParticles(obj.x, obj.y, "#00FFFF", 10);
                        hit = true;
                    }
                });
                
                enemies.forEach(en => { 
                    if(Math.hypot(b.x-(en.x+en.size/2), b.y-(en.y+en.size/2)) < en.size/2){ 
                        let damage = 10;
                        en.hp -= damage; 
                        en.flash = 2; 
                        hit = true;
                        b.hitEnemy = true;
                        if(playerUpgrades.water) en.slow = 120;
                        createParticles(b.x, b.y, en.color, 3, 2); 
                    } 
                });
                
                if(b.hitEnemy) {
                    player.vacuumCharge = Math.min(player.maxVacuumCharge, player.vacuumCharge + 5);
                    updateUI();
                }
                
                return !hit && b.x > 0 && b.x < 800 && b.y > 0 && b.y < 600;
            });

            enemyBullets = enemyBullets.filter(eb => {
                eb.x += eb.vx; 
                eb.y += eb.vy;
                if(Math.hypot(eb.x - (player.x+14), eb.y - (player.y+14)) < 15 && !player.invincible){ 
                    player.hp--; 
                    updateUI(); 
                    player.invincible = true; 
                    shakeTime = 15; 
                    const ka = Math.atan2((player.y+14)-eb.y, (player.x+14)-eb.x);
                    player.vx = Math.cos(ka)*10; 
                    player.vy = Math.sin(ka)*10;
                    setTimeout(() => player.invincible = false, 1000); 
                    return false; 
                }
                return eb.x > 0 && eb.x < 800 && eb.y > 0 && eb.y < 600;
            });

            enemies.forEach(en => { 
                if(en.hp <= 0) { 
                    createParticles(en.x+en.size/2, en.y+en.size/2, en.color, en.isBoss ? 50 : 15, en.isBoss ? 8 : 5); 
                    if(en.explode) { 
                        for(let i=0; i<4; i++) 
                            enemyBullets.push({x: en.x+en.size/2, y: en.y+en.size/2, vx: Math.cos((Math.PI/2)*i)*4, vy: Math.sin((Math.PI/2)*i)*4}); 
                    } 
                    spawnItem(en.x+en.size/2, en.y+en.size/2, en.mimic);
                    dustPoints = Math.min(MAX_DUST, dustPoints + 1);
                    
                    // NOVO: Incrementa kills e verifica upgrade
                    totalKills++;
                    updateKillCounter();
                    checkUpgradeByKills();
                    
                    updateUI();
                    
                    if(en.isBoss) {
                        bossDefeated = true;
                        document.getElementById('boss-warning').style.display = 'none';
                        createParticles(canvas.width/2, canvas.height/2, "#ffaa00", 100, 15);
                        setTimeout(() => {
                            if(!isGameOver) {
                                ctx.fillStyle = "rgba(0,0,0,0.8)";
                                ctx.fillRect(0,0,800,600);
                                ctx.fillStyle = "gold";
                                ctx.textAlign = "center";
                                ctx.font = "30px Courier New";
                                ctx.fillText("VITÓRIA! LORDE ÁCARO DERROTADO!", 400, 300);
                                ctx.font = "16px Courier New";
                                ctx.fillText("Continue explorando ou recomece o jogo", 400, 350);
                            }
                        }, 100);
                    }
                } 
            });
            enemies = enemies.filter(en => en.hp > 0);

            if (enemies.length === 0) {
                clearedRooms.add(`${currentPos.x},${currentPos.y}`);
                for(let d of doors) {
                    if (player.x < d.x + d.w && player.x + player.size > d.x && 
                        player.y < d.y + d.h && player.y + player.size > d.y) {
                        if(d.dir === 'top') currentPos.y--;
                        if(d.dir === 'bottom') currentPos.y++;
                        if(d.dir === 'left') currentPos.x--;
                        if(d.dir === 'right') currentPos.x++;
                        const newKey = `${currentPos.x},${currentPos.y}`;
                        if(!visitedRooms.has(newKey)) { 
                            visitedRooms.add(newKey); 
                            roomCount++; 
                        }
                        generateRoom(d.dir);
                        break;
                    }
                }
            }
        }

        function draw() {
            ctx.clearRect(0, 0, 800, 600);
            ctx.save(); 
            
            if (shakeTime > 0) ctx.translate((Math.random()-0.5)*shakeTime, (Math.random()-0.5)*shakeTime);
            
            const roomData = getRoomData(`${currentPos.x},${currentPos.y}`);
            
            ctx.fillStyle = roomData.isCarpet ? "#2a1a10" : "#111"; 
            ctx.fillRect(0, 0, 800, 600);
            
            if(roomData.isCarpet) { 
                ctx.strokeStyle = "rgba(255,255,255,0.03)"; 
                for(let i=0; i<800; i+=20) { 
                    ctx.beginPath(); 
                    ctx.moveTo(i,0); 
                    ctx.lineTo(i,600); 
                    ctx.stroke(); 
                } 
            }
            
            ctx.fillStyle = "#222"; 
            roomData.obstacles.forEach(o => { 
                ctx.fillRect(o.x, o.y, o.w, o.h); 
                ctx.strokeStyle="#333"; 
                ctx.strokeRect(o.x, o.y, o.w, o.h); 
            });
            
            if(lightPoints && lightPoints.length > 0) {
                for(let light of lightPoints) {
                    let gradient = ctx.createRadialGradient(light.x, light.y, 5, light.x, light.y, light.radius);
                    gradient.addColorStop(0, light.color);
                    gradient.addColorStop(0.5, `rgba(255, 150, 50, ${light.intensity * 0.5})`);
                    gradient.addColorStop(1, "rgba(0,0,0,0)");
                    
                    ctx.globalCompositeOperation = 'lighter';
                    ctx.fillStyle = gradient;
                    ctx.fillRect(0, 0, 800, 600);
                    ctx.globalCompositeOperation = 'source-over';
                }
            }
            
            ambientObjects.forEach(obj => {
                if(obj.type === 'fan') {
                    ctx.save();
                    ctx.translate(obj.x, obj.y);
                    ctx.fillStyle = obj.active ? "#00FFFF" : "#888";
                    ctx.fillRect(-15, -15, 30, 30);
                    ctx.fillStyle = "#333";
                    ctx.font = "20px Arial";
                    ctx.fillText("🌀", -8, 8);
                    ctx.fillStyle = "white";
                    ctx.font = "12px Arial";
                    if(obj.direction === 'up') ctx.fillText("↑", -3, -18);
                    if(obj.direction === 'down') ctx.fillText("↓", -3, 22);
                    if(obj.direction === 'left') ctx.fillText("←", -22, 5);
                    if(obj.direction === 'right') ctx.fillText("→", 14, 5);
                    ctx.restore();
                }
            });
            
            if (enemies.length === 0) { 
                ctx.fillStyle = "#00FFFF"; 
                doors.forEach(d => { 
                    ctx.shadowBlur = 15; 
                    ctx.shadowColor = "#00FFFF"; 
                    ctx.fillRect(d.x, d.y, d.w, d.h); 
                    ctx.shadowBlur = 0; 
                }); 
            }
            
            items.forEach(it => { 
                if(it.isMimic && !it.revealed) {
                    ctx.fillStyle = "#ff4444"; 
                    ctx.font = "20px Arial"; 
                    ctx.fillText("❤️", it.x-10, it.y+10);
                    ctx.fillStyle = `rgba(255,0,0,${0.2 + Math.sin(gameTime * 10) * 0.1})`;
                    ctx.beginPath();
                    ctx.arc(it.x, it.y, 15, 0, Math.PI*2);
                    ctx.fill();
                } else if(!it.isMimic) {
                    ctx.fillStyle = "#ff4444"; 
                    ctx.font = "20px Arial"; 
                    ctx.fillText("❤️", it.x-10, it.y+10);
                }
            });
            
            particles.forEach(p => { 
                ctx.globalAlpha = p.life; 
                ctx.fillStyle = p.color; 
                ctx.fillRect(p.x, p.y, p.size, p.size); 
            });
            
            ctx.globalAlpha = 1.0;
            ctx.fillStyle = "rgba(255,255,200,0.1)";
            ambientDust.forEach(d => { ctx.fillRect(d.x, d.y, d.s, d.s); });
            
            enemies.forEach(en => {
                ctx.save();
                ctx.translate(en.x + en.size / 2, en.y + en.size / 2); 
                
                if (en.flash > 0) ctx.filter = "brightness(5)";
                if (en.slow > 0) { ctx.shadowBlur = 10; ctx.shadowColor = "#00FFFF"; }
                
                const half = en.size / 2;
                
                if(en.type === 'polen') {
                    ctx.fillStyle = en.color;
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = "#FFD700";
                    for(let i=0; i<12; i++) {
                        let angle = (i * Math.PI * 2 / 12) + gameTime * 2;
                        let rad = half * 0.6;
                        ctx.beginPath();
                        ctx.arc(Math.cos(angle) * rad, Math.sin(angle) * rad, half * 0.2, 0, Math.PI*2);
                        ctx.fill();
                    }
                    ctx.beginPath();
                    ctx.arc(0, 0, half * 0.7, 0, Math.PI*2);
                    ctx.fill();
                    ctx.fillStyle = "rgba(255,255,200,0.3)";
                    ctx.beginPath();
                    ctx.ellipse(-half*0.8, -half*0.3, half*0.5, half*0.3, -0.5, 0, Math.PI*2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.ellipse(half*0.8, -half*0.3, half*0.5, half*0.3, 0.5, 0, Math.PI*2);
                    ctx.fill();
                }
                else if(en.type === 'mofo') {
                    ctx.fillStyle = en.color;
                    ctx.fillRect(-half, -half, en.size, en.size);
                    ctx.fillStyle = "#654321";
                    for(let i=0; i<8; i++) {
                        ctx.beginPath();
                        ctx.arc(-half + (i%4) * (half*0.8), -half + Math.floor(i/4) * (half*0.8), half*0.2, 0, Math.PI*2);
                        ctx.fill();
                    }
                    ctx.strokeStyle = "rgba(139,69,19,0.5)";
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    ctx.arc(0, 0, half + 5 + Math.sin(gameTime*10)*2, 0, Math.PI*2);
                    ctx.stroke();
                }
                else if(en.type === 'mimic') {
                    ctx.fillStyle = "#8B0000";
                    ctx.beginPath();
                    ctx.ellipse(0, 0, half, half, 0, 0, Math.PI*2);
                    ctx.fill();
                    ctx.fillStyle = "#FF0000";
                    ctx.beginPath();
                    ctx.ellipse(-half*0.3, -half*0.2, half*0.2, half*0.3, 0, 0, Math.PI*2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.ellipse(half*0.3, -half*0.2, half*0.2, half*0.3, 0, 0, Math.PI*2);
                    ctx.fill();
                    ctx.fillStyle = "#FFF";
                    ctx.beginPath();
                    ctx.arc(-half*0.3, -half*0.25, 2, 0, Math.PI*2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(half*0.3, -half*0.25, 2, 0, Math.PI*2);
                    ctx.fill();
                    ctx.fillStyle = "#FFF";
                    for(let i=-1; i<=1; i++) {
                        ctx.beginPath();
                        ctx.moveTo(i*8, 5);
                        ctx.lineTo(i*8+4, 12);
                        ctx.lineTo(i*8-4, 12);
                        ctx.fill();
                    }
                }
                else if (en.type === 'acaro') { 
                    ctx.strokeStyle = en.color; ctx.lineWidth = Math.max(2, en.size * 0.1); 
                    for(let i = 0; i < 8; i++) { 
                        ctx.beginPath(); 
                        let a = (i * Math.PI / 4) + Math.sin(gameTime * 5 + i) * 0.4; 
                        let legLen = half * 1.2;
                        ctx.moveTo(0, 0); 
                        ctx.lineTo(Math.cos(a) * (legLen * 0.6), Math.sin(a) * (legLen * 0.6)); 
                        ctx.lineTo(Math.cos(a + 0.3) * legLen, Math.sin(a + 0.3) * legLen); 
                        ctx.stroke(); 
                    } 
                    ctx.fillStyle = en.color; 
                    ctx.beginPath(); 
                    ctx.ellipse(0, 0, half * 0.8, half * 0.6, 0, 0, Math.PI * 2); 
                    ctx.fill(); 
                } 
                else if (en.type === 'tufo') { 
                    ctx.fillStyle = en.color; 
                    let breath = Math.sin(gameTime * 3) * 0.1;
                    for(let i = 0; i < 6; i++) { 
                        ctx.beginPath(); 
                        let angle = (i * Math.PI * 2) / 6;
                        let dist = half * 0.5 * (1 + breath);
                        let radius = half * 0.6;
                        ctx.arc(Math.cos(angle) * dist, Math.sin(angle) * dist, radius, 0, Math.PI * 2); 
                        ctx.fill(); 
                    } 
                    ctx.beginPath();
                    ctx.arc(0, 0, half * 0.7, 0, Math.PI * 2);
                    ctx.fill();
                } 
                else if (en.type === 'esporo' || en.type === 'esporo_mini') { 
                    ctx.fillStyle = en.color; 
                    ctx.strokeStyle = en.color;
                    ctx.lineWidth = 2;
                    let spikePulse = Math.sin(gameTime * 8) * 0.2;
                    for(let i = 0; i < 8; i++) { 
                        ctx.beginPath(); 
                        let angle = (i * Math.PI * 2) / 8 + (gameTime * 0.5);
                        let spikeLen = half * (0.8 + spikePulse);
                        ctx.moveTo(0, 0); 
                        ctx.lineTo(Math.cos(angle) * spikeLen, Math.sin(angle) * spikeLen); 
                        ctx.stroke(); 
                        ctx.beginPath();
                        ctx.arc(Math.cos(angle) * spikeLen, Math.sin(angle) * spikeLen, half * 0.15, 0, Math.PI * 2);
                        ctx.fill();
                    } 
                    ctx.beginPath();
                    ctx.arc(0, 0, half * 0.5, 0, Math.PI * 2);
                    ctx.fill();
                }
                if (en.isBoss) {
                    const s = en.size / 2;
                    ctx.strokeStyle = "#5d4037";
                    ctx.lineWidth = 8;
                    ctx.fillStyle = "#8d6e63";
                    for(let i=0; i<4; i++) {
                        const angle = Math.PI / 4 + (i * Math.PI / 2) + Math.sin(gameTime * 2 + i) * 0.2;
                        const legX = Math.cos(angle) * s * 1.2;
                        const legY = Math.sin(angle) * s * 1.2;
                        ctx.beginPath();
                        ctx.moveTo(Math.cos(angle) * s * 0.5, Math.sin(angle) * s * 0.5);
                        ctx.quadraticCurveTo(legX * 1.4, legY * 0.2, legX, legY);
                        ctx.stroke();
                        ctx.beginPath();
                        ctx.arc(legX, legY, 6, 0, Math.PI*2);
                        ctx.fill();
                        ctx.stroke();
                    }
                    let bodyGrad = ctx.createRadialGradient(0, -10, s*0.2, 0, 0, s);
                    bodyGrad.addColorStop(0, "#d7ccc8");
                    bodyGrad.addColorStop(0.6, "#a1887f");
                    bodyGrad.addColorStop(1, "#5d4037");
                    ctx.fillStyle = bodyGrad;
                    ctx.strokeStyle = "#3e2723";
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    ctx.ellipse(0, 0, s, s * 0.85, 0, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.stroke();
                    ctx.strokeStyle = "rgba(62, 39, 35, 0.3)";
                    ctx.lineWidth = 2;
                    for(let i=-2; i<=2; i++) {
                        ctx.beginPath();
                        ctx.ellipse(0, i * 15, s * 0.8, s * 0.2, 0, 0, Math.PI, true);
                        ctx.stroke();
                    }
                    ctx.fillStyle = "#8d6e63";
                    ctx.strokeStyle = "#3e2723";
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    ctx.arc(0, -s * 0.6, s * 0.4, Math.PI, 0);
                    ctx.lineTo(s*0.3, -s*0.3);
                    ctx.lineTo(-s*0.3, -s*0.3);
                    ctx.closePath();
                    ctx.fill();
                    ctx.stroke();
                    ctx.fillStyle = "#3e2723";
                    const fangAngle = Math.atan2((player.y + 14) - (en.y + en.size / 2), (player.x + 14) - (en.x + en.size / 2)) - Math.PI/2;
                    ctx.save();
                    ctx.translate(0, -s * 0.8);
                    ctx.rotate(fangAngle * 0.2);
                    ctx.beginPath();
                    ctx.moveTo(-15, 0);
                    ctx.bezierCurveTo(-35, -20, -25, -50, -10, -55);
                    ctx.lineTo(-5, -30);
                    ctx.closePath();
                    ctx.fill();
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.moveTo(15, 0);
                    ctx.bezierCurveTo(35, -20, 25, -50, 10, -55);
                    ctx.lineTo(5, -30);
                    ctx.closePath();
                    ctx.fill();
                    ctx.stroke();
                    ctx.restore();
                    ctx.fillStyle = en.state === 'dash' ? "#ff1744" : "#ffeb3b";
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = ctx.fillStyle;
                    for(let i=0; i<3; i++) {
                        ctx.beginPath(); ctx.arc(-25 + i*5, -s*0.65 - i*3, 4, 0, Math.PI*2); ctx.fill();
                        ctx.beginPath(); ctx.arc(25 - i*5, -s*0.65 - i*3, 4, 0, Math.PI*2); ctx.fill();
                    }
                    ctx.shadowBlur = 0;
                }
                ctx.restore();
            });

            if (!player.invincible || Math.floor(gameTime*10) % 2 === 0) {
                ctx.save();
                const bobOffset = Math.sin(player.walkCycle) * 4;
                const tilt = Math.cos(player.walkCycle) * 0.08;
                ctx.translate(player.x + player.size/2, player.y + player.size/2); 
                ctx.rotate(tilt);
                if (player.isMoving) { 
                    ctx.fillStyle = "#555"; 
                    ctx.fillRect(-12, 10 + Math.sin(player.walkCycle) * 8, 8, 6); 
                    ctx.fillRect(4, 10 + Math.sin(player.walkCycle + Math.PI) * 8, 8, 6); 
                }
                ctx.fillStyle = "white"; 
                ctx.fillRect(-player.size/2, -player.size/2 + bobOffset, player.size, player.size);
                ctx.fillStyle = "black"; 
                ctx.fillRect(-9, -6 + bobOffset, 5, 5); 
                ctx.fillRect(4, -6 + bobOffset, 5, 5);
                const angle = Math.atan2(mouse.y - (player.y+14), mouse.x - (player.x+14)) - tilt;
                ctx.save(); 
                ctx.rotate(angle); 
                ctx.translate(0, bobOffset + (player.isMoving ? Math.random() * 2 : 0));
                ctx.fillStyle = "#666"; 
                ctx.fillRect(15, -4, 22, 8); 
                if (player.isVacuuming) { 
                    ctx.fillStyle = isSuperVacuumActive ? "rgba(255, 0, 255, 0.4)" : "rgba(0, 255, 255, 0.2)"; 
                    ctx.beginPath(); 
                    ctx.moveTo(35,0); 
                    ctx.lineTo(playerUpgrades.filter,-70); 
                    ctx.lineTo(playerUpgrades.filter,70); 
                    ctx.fill(); 
                }
                ctx.restore(); 
                ctx.restore();
            }

            ctx.fillStyle = playerUpgrades.water ? "#00FFFF" : "yellow"; 
            bullets.forEach(b => ctx.fillRect(b.x-2, b.y-2, 4, 4));
            ctx.fillStyle = "magenta"; 
            enemyBullets.forEach(eb => { ctx.beginPath(); ctx.arc(eb.x, eb.y, 5, 0, Math.PI*2); ctx.fill(); });
            
            if (enemies.length > 0 && enemies[0].isBoss) { 
                ctx.fillStyle = "#300"; 
                ctx.fillRect(100, 20, 600, 15);
                ctx.fillStyle = "red"; 
                ctx.fillRect(100, 20, (enemies[0].hp/3000)*600, 15);
                ctx.fillStyle = "white";
                ctx.font = "12px Courier New";
                ctx.fillText("Lorde Ácaro", 380, 18);
            }

            let darknessGradient = ctx.createRadialGradient(player.x+14, player.y+14, 50, player.x+14, player.y+14, 300);
            darknessGradient.addColorStop(0, "rgba(0,0,0,0)");
            darknessGradient.addColorStop(0.5, "rgba(0,0,0,0.15)");
            darknessGradient.addColorStop(1, "rgba(0,0,0,0.5)");
            
            ctx.fillStyle = darknessGradient;
            ctx.fillRect(0, 0, 800, 600);
            
            if (isGameOver) { 
                ctx.fillStyle = "rgba(0,0,0,0.8)"; 
                ctx.fillRect(0,0,800,600); 
                ctx.fillStyle = "white"; 
                ctx.textAlign="center"; 
                ctx.font="40px Courier New"; 
                ctx.fillText("ALERGIA VENCEU!", 400, 300); 
                ctx.font="20px Courier New"; 
                ctx.fillText("CLIQUE PARA RECOMEÇAR", 400, 350); 
            }
            ctx.restore();
        }

        function loop() { 
            update(); 
            draw(); 
            requestAnimationFrame(loop); 
        }
        
        bossRoomPosition = chooseRandomBossRoom();
        console.log(`Boss escondido na sala: (${bossRoomPosition.x}, ${bossRoomPosition.y})`);
        
        generateRoom();
        loop();
    </script>
</body>
